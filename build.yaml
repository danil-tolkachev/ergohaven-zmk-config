# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "blue-velvet_left", "blue-velvet_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41

---
include:
  - board: ergohaven
    shield: velvet_v3_dongle prospector_adapter
    snippet: zmk-usb-logging
    # snippet: studio-rpc-usb-uart
    # cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: velvet_v3_dongle-ergohaven-zmk
  - board: ergohaven
    shield: velvet_v3_ruen velvet_v3_dongle prospector_adapter
    snippet: zmk-usb-logging
    # snippet: studio-rpc-usb-uart
    # cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: velvet_v3_dongle_ruen-ergohaven-zmk
  - board: ergohaven
    shield: velvet_v3_left_dongle
    snippet: zmk-usb-logging
  - board: ergohaven
    shield: velvet_v3_left
    snippet: zmk-usb-logging
    # snippet: studio-rpc-usb-uart
    # cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: ergohaven
    shield: velvet_v3_ruen velvet_v3_left
    snippet: zmk-usb-logging
    # snippet: studio-rpc-usb-uart
    # cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: velvet_v3_left_ruen-ergohaven-zmk
  - board: ergohaven
    shield: velvet_v3_right
    snippet: zmk-usb-logging

  - board: ergohaven
    shield: velvet_v3_ui_left
    snippet: zmk-usb-logging
  - board: ergohaven
    shield: velvet_v3_ui_ruen velvet_v3_ui_right
    snippet: zmk-usb-logging
    # snippet: studio-rpc-usb-uart
    # cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: velvet_v3_ui_right_ruen-ergohaven-zmk
  - board: ergohaven
    snippet: zmk-usb-logging
    shield: velvet_v3_ui_right

  - board: ergohaven
    shield: op36_dongle prospector_adapter
    snippet: zmk-usb-logging
    keymap: op36
    # snippet: studio-rpc-usb-uart
    # cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: op36_dongle-ergohaven-zmk
  - board: ergohaven
    shield: prospector_adapter op36_dongle
    keymap: op36_ruen
    snippet: zmk-usb-logging
    # snippet: studio-rpc-usb-uart
    # cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: op36_dongle_ruen-ergohaven-zmk
  - board: ergohaven
    shield: op36_left_dongle
    keymap: op36
  - board: ergohaven
    shield: op36_left
    keymap: op36
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: ergohaven
    shield: op36_left
    keymap: op36_ruen
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: op36_left_ruen-ergohaven-zmk
  - board: ergohaven
    shield: op36_right

  - board: ergohaven
    shield: settings_reset
